name: Deploy OpenPortfolio

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask pytest

      - name: Run tests
        run: PYTHONPATH=src python -m pytest tests/ -q

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Verify SSH access and app directory
        shell: bash
        run: |
          ssh -i ~/.ssh/id_rsa -o IdentitiesOnly=yes -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "mkdir -p '${{ secrets.APP_DIR }}' && test -w '${{ secrets.APP_DIR }}'"

      - name: Sync repository
        shell: bash
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.venv' \
            -e "ssh -i ~/.ssh/id_rsa -o IdentitiesOnly=yes -p ${{ secrets.SSH_PORT }}" \
            ./ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.APP_DIR }}/"

      - name: Run remote deploy
        shell: bash
        run: |
          ssh -i ~/.ssh/id_rsa -o IdentitiesOnly=yes -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "cd '${{ secrets.APP_DIR }}' && chmod +x ./scripts/deploy_shared_host.sh && APP_DIR='${{ secrets.APP_DIR }}' RESTART_TOUCH_FILE='${{ secrets.RESTART_TOUCH_FILE }}' ./scripts/deploy_shared_host.sh"
