{% extends "base.html" %}
{% block title %}{{ form_title }} - OpenPortfolio{% endblock %}
{% block head %}
<script>
document.addEventListener("DOMContentLoaded", function () {
  const typeSelect = document.getElementById("instrument_type");
  function updateFields() {
    const type = typeSelect.value;
    document.querySelectorAll(".bond-only").forEach(e => e.style.display = (type === "BOND") ? "flex" : "none");
    document.querySelectorAll(".stock-only").forEach(e => e.style.display = (type === "STOCK") ? "flex" : "none");
  }
  if (typeSelect) {
    typeSelect.addEventListener("change", updateFields);
    updateFields();
  }
});
</script>
{% endblock %}
{% block content %}
<h2>{{ form_title }}</h2>
<form method="post">
  <input type="hidden" name="client_id" value="{{ selected_client_id if selected_client_id else '' }}">
  <input type="hidden" name="portfolio_id" value="{{ selected_portfolio_id if selected_portfolio_id else '' }}">
  <input type="hidden" name="action" value="{{ action }}">

  <div class="form-row">
    <label for="instrument_id">Instrument ID</label>
    <input id="instrument_id" name="instrument_id" value="{{ instrument.instrument_id or '' }}" {% if action == 'add' %}required{% else %}readonly{% endif %}>
  </div>
  <div class="form-row">
    <label for="isin">ISIN</label>
    <input id="isin" name="isin" value="{{ instrument.isin or '' }}">
  </div>
  <div class="form-row">
    <label for="description">Omschrijving</label>
    <input id="description" name="description" value="{{ instrument.description or '' }}" required>
  </div>
  <div class="form-row">
    <label for="instrument_type">Type</label>
    <select id="instrument_type" name="instrument_type" required {% if action != 'add' %}disabled{% endif %}>
      {% for t in instrument_types %}<option value="{{ t }}" {% if t == instrument.instrument_type %}selected{% endif %}>{{ t }}</option>{% endfor %}
    </select>
  </div>
  <div class="form-row">
    <label for="issue_currency">Valuta</label>
    <input id="issue_currency" name="issue_currency" value="{{ instrument.issue_currency or 'EUR' }}" required>
  </div>
  <div class="form-row">
    <label for="minimum_purchase_value">Minimale ordergrootte</label>
    <input id="minimum_purchase_value" name="minimum_purchase_value" value="{{ instrument.minimum_purchase_value or 1 }}" required>
  </div>
  <div class="form-row">
    <label for="smallest_trading_unit">Handelseenheid</label>
    <input id="smallest_trading_unit" name="smallest_trading_unit" value="{{ instrument.smallest_trading_unit or 1 }}" required>
  </div>

  <div class="form-row bond-only">
    <label for="issuer">Issuer</label>
    <input id="issuer" name="issuer" value="{{ instrument.issuer or '' }}">
  </div>
  <div class="form-row bond-only">
    <label for="start_date">Startdatum</label>
    <input id="start_date" type="date" name="start_date" value="{{ instrument.start_date|default('', true) }}">
  </div>
  <div class="form-row bond-only">
    <label for="maturity_date">Einddatum</label>
    <input id="maturity_date" type="date" name="maturity_date" value="{{ instrument.maturity_date|default('', true) }}">
  </div>
  <div class="form-row bond-only">
    <label for="interest_rate">Couponrente (%)</label>
    <input id="interest_rate" name="interest_rate" value="{{ instrument.interest_rate or '' }}">
  </div>
  <div class="form-row bond-only">
    <label for="interest_payment_frequency">Couponfrequentie</label>
    <select id="interest_payment_frequency" name="interest_payment_frequency">
      {% for f in payment_frequencies %}<option value="{{ f }}" {% if f == instrument.interest_payment_frequency %}selected{% endif %}>{{ f }}</option>{% endfor %}
    </select>
  </div>
  <div class="form-row bond-only">
    <label for="day_count_convention">Renteberekeningswijze</label>
    <select id="day_count_convention" name="day_count_convention">
      <option value="360/360" {% if instrument.day_count_convention == '360/360' %}selected{% endif %}>360/360</option>
      <option value="ACT/ACT" {% if instrument.day_count_convention == 'ACT/ACT' %}selected{% endif %}>ACT/ACT</option>
    </select>
  </div>

  <div class="form-actions">
    <button class="button" type="submit">{{ action == 'add' and 'Toevoegen' or 'Opslaan' }}</button>
    <a class="button cancel" href="/instruments">Annuleren</a>
  </div>
</form>
{% endblock %}
